<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa BĐS - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --info: #36b9cc;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR & TOPBAR ĐỒNG BỘ */
        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

            .sidebar-brand i {
                transform: rotate(-15deg);
                margin-right: 10px;
                font-size: 24px;
            }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-heading {
            padding: 15px 20px 5px 20px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item i {
                width: 20px;
                text-align: center;
                font-size: 16px;
            }

            .nav-item:hover, .nav-item.active {
                color: white;
            }

        .divider {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 10px 20px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            z-index: 10;
        }

        .topbar-left a {
            color: var(--dark);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            background: var(--bg-light);
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

            .topbar-left a:hover {
                background: #eaecf4;
            }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

            .user-profile span {
                font-weight: 600;
                color: var(--dark);
                font-size: 14px;
            }

        .btn-logout {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }

        /* FORM STYLES */
        .container-fluid {
            padding: 25px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-title {
            margin: 0;
            color: var(--dark);
            font-weight: 400;
            font-size: 28px;
        }

        .back-btn {
            background: white;
            color: var(--dark);
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

            .back-btn:hover {
                background: #eaecf4;
                color: var(--primary);
            }

        .form-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            border-top: 4px solid var(--primary);
        }

            .form-container h2 {
                text-align: center;
                color: var(--dark);
                margin-top: 0;
                margin-bottom: 30px;
                font-weight: 800;
                font-size: 22px;
            }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                font-weight: bold;
                font-size: 14px;
                margin-bottom: 8px;
                color: var(--dark);
            }

            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                padding: 10px 15px;
                border: 1px solid #d1d3e2;
                border-radius: 5px;
                font-size: 14px;
                box-sizing: border-box;
                outline: none;
                transition: 0.3s;
            }

                .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
                    border-color: var(--primary);
                    box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
                }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--warning);
            color: #333;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

            .submit-btn:hover {
                background: #dda20a;
            }

        #current-img-preview {
            width: 200px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            display: block;
            border: 1px solid #ddd;
        }

        #message {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand"><i class="fas fa-laugh-wink"></i> BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-fw fa-tachometer-alt"></i> Dashboard</a>

            <div class="divider"></div>
            <div class="nav-heading">Quản trị Nguồn hàng</div>
            <a href="add-property.html" class="nav-item"><i class="fas fa-fw fa-plus-square"></i> Đăng tin mới</a>
            <a href="manage-properties.html" class="nav-item"><i class="fas fa-fw fa-building"></i> DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item"><i class="fas fa-fw fa-tags"></i> Dự án & Chủ nhà</a>

            <div class="divider"></div>
            <div class="nav-heading">Nghiệp vụ Sales</div>
            <a href="manage-transactions.html" class="nav-item"><i class="fas fa-fw fa-handshake"></i> Quản lý Giao dịch</a>
            <a href="manage-clients.html" class="nav-item"><i class="fas fa-fw fa-calendar-alt"></i> Lịch hẹn xem nhà</a>
            <a href="manage-customers.html" class="nav-item"><i class="fas fa-fw fa-users"></i> Hồ sơ Khách hàng</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-left"><a href="index.html"><i class="fas fa-globe"></i> Xem trang chủ Website</a></div>
            <div class="user-profile">
                <span id="adminName">Đang tải...</span>
                <img src="https://source.unsplash.com/QAB-WJcbgJk/60x60" style="width: 32px; height: 32px; border-radius: 50%;">
                <button onclick="logout()" class="btn-logout" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="container-fluid">
            <div class="page-header">
                <h1 class="page-title">Chỉnh sửa Hồ sơ</h1>
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Hủy và quay lại</a>
            </div>

            <div class="form-container">
                <h2><i class="fas fa-edit"></i> CẬP NHẬT THÔNG TIN BĐS</h2>

                <div class="form-group">
                    <label>Tiêu đề bài đăng</label>
                    <input type="text" id="tieuDe">
                </div>

                <div class="row">
                    <div class="col form-group">
                        <label>Loại hình</label>
                        <select id="loaiHinh"></select>
                    </div>
                    <div class="col form-group">
                        <label>Mức giá (VNĐ)</label>
                        <input type="number" id="gia">
                    </div>
                </div>

                <div class="row">
                    <div class="col form-group">
                        <label>Thuộc Dự án</label>
                        <select id="duAn"></select>
                    </div>
                    <div class="col form-group">
                        <label>Chủ nhà ký gửi</label>
                        <select id="chuNha"></select>
                    </div>
                </div>

                <div class="row">
                    <div class="col form-group">
                        <label>Diện tích (m²)</label>
                        <input type="number" id="dienTich">
                    </div>
                    <div class="col form-group">
                        <label>Số phòng ngủ</label>
                        <input type="number" id="phongNgu">
                    </div>
                </div>

                <div class="form-group">
                    <label>Địa chỉ</label>
                    <input type="text" id="diaChi">
                </div>

                <div class="form-group">
                    <label>Mô tả chi tiết</label>
                    <textarea id="moTa" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Hình ảnh hiện tại</label>
                    <img id="current-img-preview" src="" alt="Chưa có ảnh">
                    <label style="margin-top: 15px; color: var(--primary);">Thay đổi ảnh mới (Để trống nếu giữ nguyên)</label>
                    <input type="file" id="hinhAnh" accept="image/*">
                </div>

                <button class="submit-btn" onclick="updateProperty()"><i class="fas fa-save"></i> LƯU THAY ĐỔI</button>
                <p id="message"></p>
            </div>
        </div>
    </div>

    <script>
        let currentId = null;

        document.addEventListener("DOMContentLoaded", async () => {
            const role = localStorage.getItem("role");
            const username = localStorage.getItem("username");
            if (role !== "Admin" && role !== "Sales") {
                window.location.href = "index.html"; return;
            }
            document.getElementById("adminName").innerText = username || "Sales";

            const urlParams = new URLSearchParams(window.location.search);
            currentId = urlParams.get('id');

            if (currentId) {
                await loadMasterData();
                loadOldData(currentId);
            }
        });

        function logout() { localStorage.clear(); window.location.href = "login.html"; }

        async function loadMasterData() {
            try {
                const [resCat, resProj, resOwn] = await Promise.all([
                    fetch('/api/Category'), fetch('/api/Project'), fetch('/api/Owner')
                ]);

                const cats = await resCat.json();
                let catHtml = '<option value="">-- Chọn Loại hình --</option>';
                cats.forEach(c => catHtml += `<option value="${c.name}">${c.name}</option>`);
                document.getElementById('loaiHinh').innerHTML = catHtml;

                const projs = await resProj.json();
                let projHtml = '<option value="">-- Nhà lẻ --</option>';
                projs.forEach(p => projHtml += `<option value="${p.id}">${p.name}</option>`);
                document.getElementById('duAn').innerHTML = projHtml;

                const owns = await resOwn.json();
                let ownHtml = '<option value="">-- Chọn Chủ nhà --</option>';
                owns.forEach(o => ownHtml += `<option value="${o.id}">${o.fullName}</option>`);
                document.getElementById('chuNha').innerHTML = ownHtml;
            } catch (err) { console.error("Lỗi load master data", err); }
        }

        async function loadOldData(id) {
            try {
                const response = await fetch(`/api/BatDongSan/${id}`);
                const data = await response.json();

                document.getElementById('tieuDe').value = data.tieuDe;
                document.getElementById('loaiHinh').value = data.loaiHinh;
                document.getElementById('gia').value = data.gia;
                document.getElementById('diaChi').value = data.diaChi;
                document.getElementById('moTa').value = data.moTa || "";
                document.getElementById('dienTich').value = data.dienTich || 0;
                document.getElementById('phongNgu').value = data.phongNgu || 0;
                document.getElementById('duAn').value = data.projectId || "";
                document.getElementById('chuNha').value = data.ownerId || "";

                if (data.hinhAnhUrl) {
                    document.getElementById('current-img-preview').src = data.hinhAnhUrl;
                }
            } catch (err) { alert("Không thể tải dữ liệu cũ!"); }
        }

        async function updateProperty() {
            const msg = document.getElementById('message');
            const fileInput = document.getElementById('hinhAnh');

            const formData = new FormData();
            formData.append("TieuDe", document.getElementById('tieuDe').value);
            formData.append("LoaiHinh", document.getElementById('loaiHinh').value);
            formData.append("Gia", document.getElementById('gia').value);
            formData.append("DiaChi", document.getElementById('diaChi').value);
            formData.append("MoTa", document.getElementById('moTa').value);
            formData.append("DienTich", document.getElementById('dienTich').value);
            formData.append("PhongNgu", document.getElementById('phongNgu').value);
            formData.append("ProjectId", document.getElementById('duAn').value);
            formData.append("OwnerId", document.getElementById('chuNha').value);

            if (fileInput.files[0]) {
                formData.append("HinhAnhFile", fileInput.files[0]);
            }

            msg.style.color = "blue"; msg.innerText = "Đang cập nhật...";

            try {
                const response = await fetch(`/api/BatDongSan/${currentId}`, {
                    method: 'PUT', body: formData
                });

                if (response.ok) {
                    msg.style.color = "green"; msg.innerText = "Cập nhật thành công!";
                    setTimeout(() => { window.location.href = `detail.html?id=${currentId}`; }, 1500);
                } else {
                    const errorData = await response.json();
                    msg.style.color = "red"; msg.innerText = " Lỗi: " + (errorData.message || "Cập nhật thất bại");
                }
            } catch (error) {
                msg.style.color = "red"; msg.innerText = "Lỗi kết nối server!";
            }
        }
    </script>
</body>
</html>
