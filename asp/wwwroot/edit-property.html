<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa BĐS - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item:hover, .nav-item.active {
                color: white;
            }

        .divider {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 10px 20px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            z-index: 10;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .container-fluid {
            padding: 25px;
        }

        .form-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            border-top: 4px solid var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                font-weight: bold;
                font-size: 14px;
                margin-bottom: 8px;
                color: var(--dark);
            }

            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                padding: 10px 15px;
                border: 1px solid #d1d3e2;
                border-radius: 5px;
                outline: none;
            }

        .row {
            display: flex;
            gap: 20px;
        }

        .col {
            flex: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--warning);
            color: #333;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #current-img-preview {
            width: 200px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand">BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
            <div class="divider"></div>
            <a href="manage-properties.html" class="nav-item active">DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item">Dự án & Chủ nhà</a>
            <a href="manage-clients.html" class="nav-item">Lịch hẹn xem nhà</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-left"><a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:bold;">Xem Website</a></div>
            <div class="user-profile"><span id="adminName">Admin</span></div>
        </header>

        <div class="container-fluid">
            <div class="form-container">
                <h2 style="text-align:center;">CẬP NHẬT BẤT ĐỘNG SẢN</h2>
                <div class="form-group">
                    <label>Tiêu đề bài đăng</label>
                    <input type="text" id="tieuDe">
                </div>
                <div class="row">
                    <div class="col form-group">
                        <label>Loại hình</label>
                        <select id="loaiHinh">
                            <option value="Căn hộ">Căn hộ/Chung cư</option>
                            <option value="Nhà phố">Nhà phố/Liền kề</option>
                            <option value="Biệt thự">Biệt thự</option>
                            <option value="Đất nền">Đất nền dự án</option>
                        </select>
                    </div>
                    <div class="col form-group">
                        <label>Mức giá (VNĐ)</label>
                        <input type="number" id="gia">
                    </div>
                </div>
                <div class="row">
                    <div class="col form-group"><label>Dự án</label><select id="duAn"></select></div>
                    <div class="col form-group"><label>Chủ nhà</label><select id="chuNha"></select></div>
                </div>
                <div class="row">
                    <div class="col form-group"><label>Diện tích (m²)</label><input type="number" id="dienTich"></div>
                    <div class="col form-group"><label>Phòng ngủ</label><input type="number" id="phongNgu"></div>
                </div>
                <div class="form-group"><label>Địa chỉ</label><input type="text" id="diaChi"></div>
                <div class="form-group"><label>Mô tả</label><textarea id="moTa" rows="3"></textarea></div>
                <div class="form-group">
                    <label>Ảnh hiện tại</label>
                    <img id="current-img-preview" src="">
                    <input type="file" id="hinhAnh" style="margin-top:10px;">
                </div>
                <button class="submit-btn" onclick="updateProperty()">LƯU THAY ĐỔI</button>
                <p id="message" style="text-align:center; font-weight:bold; margin-top:10px;"></p>
            </div>
        </div>
    </div>

    <script>
        let currentId = new URLSearchParams(window.location.search).get('id');

        document.addEventListener("DOMContentLoaded", async () => {
            const username = localStorage.getItem("username");
            document.getElementById("adminName").innerText = username || "Admin";
            await loadMasterData();
            loadOldData();
        });

        async function loadMasterData() {
            const [resP, resO] = await Promise.all([fetch('/api/Project'), fetch('/api/Owner')]);
            const projs = await resP.json();
            const owns = await resO.json();

            let pth = '<option value="">-- Nhà lẻ --</option>';
            projs.forEach(p => pth += `<option value="${p.id}">${p.name}</option>`);
            document.getElementById('duAn').innerHTML = pth;

            let oth = '<option value="">-- Chưa chọn --</option>';
            owns.forEach(o => oth += `<option value="${o.id}">${o.fullName}</option>`);
            document.getElementById('chuNha').innerHTML = oth;
        }

        async function loadOldData() {
            const res = await fetch(`/api/BatDongSan/${currentId}`);
            const data = await res.json();
            document.getElementById('tieuDe').value = data.tieuDe;
            document.getElementById('loaiHinh').value = data.loaiHinh;
            document.getElementById('gia').value = data.gia;
            document.getElementById('diaChi').value = data.diaChi;
            document.getElementById('moTa').value = data.moTa;
            document.getElementById('dienTich').value = data.dienTich;
            document.getElementById('phongNgu').value = data.phongNgu;
            document.getElementById('duAn').value = data.projectId || "";
            document.getElementById('chuNha').value = data.ownerId || "";
            document.getElementById('current-img-preview').src = data.hinhAnhUrl;
        }

        async function updateProperty() {
            const msg = document.getElementById('message');
            const formData = new FormData();
            formData.append("Id", currentId);
            formData.append("TieuDe", document.getElementById('tieuDe').value);
            formData.append("LoaiHinh", document.getElementById('loaiHinh').value);
            formData.append("Gia", document.getElementById('gia').value || 0);
            formData.append("DienTich", document.getElementById('dienTich').value || 0);
            formData.append("PhongNgu", document.getElementById('phongNgu').value || 0);
            formData.append("DiaChi", document.getElementById('diaChi').value);
            formData.append("MoTa", document.getElementById('moTa').value);

            const pId = document.getElementById('duAn').value;
            if (pId) formData.append("ProjectId", pId);
            const oId = document.getElementById('chuNha').value;
            if (oId) formData.append("OwnerId", oId);

            const file = document.getElementById('hinhAnh').files[0];
            if (file) formData.append("HinhAnhFile", file);

            msg.style.color = "blue"; msg.innerText = "Đang lưu...";

            const res = await fetch(`/api/BatDongSan/${currentId}`, { method: 'PUT', body: formData });
            if (res.ok) {
                msg.style.color = "green"; msg.innerText = "Thành công!";
                setTimeout(() => location.href = 'manage-properties.html', 1000);
            } else {
                const err = await res.json();
                console.log(err);
                msg.style.color = "red"; msg.innerText = "Lỗi: " + (err.title || "Dữ liệu không hợp lệ");
            }
        }
    </script>
</body>
</html>
