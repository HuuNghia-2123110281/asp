<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --dark: #5a5c69;
            --bg: #f8f9fc;
            --success: #1cc88a;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

            .card h2 {
                color: var(--dark);
                margin-top: 0;
                margin-bottom: 10px;
            }

            .card p {
                color: #858796;
                font-size: 14px;
                margin-bottom: 25px;
                line-height: 1.5;
            }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

            .input-group i {
                position: absolute;
                left: 15px;
                top: 14px;
                color: #b7b9cc;
            }

            .input-group input {
                width: 100%;
                padding: 12px 15px 12px 40px;
                border: 1px solid #d1d3e2;
                border-radius: 20px;
                font-size: 14px;
                outline: none;
                box-sizing: border-box;
                transition: 0.3s;
            }

                .input-group input:focus {
                    border-color: var(--primary);
                    box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
                }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

            .btn-reset:hover {
                background: #2e59d9;
            }

            .btn-reset:disabled {
                background: #b7b9cc;
                cursor: not-allowed;
            }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

            .links a:hover {
                text-decoration: underline;
            }

        #resultBox {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #e8f0fe;
            border: 1px dashed var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2><i class="fas fa-key" style="color:var(--primary)"></i> Khôi phục mật khẩu</h2>
        <p>Vui lòng nhập Tài khoản bạn đã dùng để đăng ký. Hệ thống sẽ gửi mật khẩu mới qua Email của bạn.</p>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Nhập Gmail của bạn...">
        </div>

        <button class="btn-reset" id="resetBtn" onclick="resetPassword()">GỬI YÊU CẦU</button>

        <div id="resultBox"></div>

        <div class="links" style="margin-top: 25px;">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Quay lại trang Đăng nhập</a>
        </div>
    </div>

    <script>
        async function resetPassword() {
            const username = document.getElementById("username").value.trim();
            if (!username) {
                alert("Vui lòng nhập tài khoản (Gmail)!");
                return;
            }

            const btn = document.getElementById("resetBtn");
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi Email...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/Auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById("resultBox").style.display = "block";
                    document.getElementById("resultBox").innerHTML = `
                        <i class="fas fa-check-circle" style="color:var(--success); font-size: 40px; margin-bottom: 10px;"></i>
                        <p style="margin:0; font-weight:bold; color:var(--dark); font-size: 16px;">${data.message}</p>
                        <p style="font-size:13px; color:#858796; margin-top: 8px;">Vui lòng kiểm tra Hộp thư đến (hoặc thư mục Spam).</p>
                    `;
                    btn.style.display = "none";
                } else {
                    alert("Lỗi: " + (data.message || "Tài khoản không tồn tại trong hệ thống!"));
                    btn.innerHTML = 'GỬI YÊU CẦU';
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Lỗi kết nối đến máy chủ! Vui lòng thử lại sau.");
                btn.innerHTML = 'GỬI YÊU CẦU';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
