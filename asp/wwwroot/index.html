<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bất Động Sản Nghĩa - Hệ thống tìm kiếm nhà đất</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --accent: #e91e63;
            --dark: #202124;
            --gray: #5f6368;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            margin: 0;
            color: #202124;
        }

        /* HEADER CĂN GIỮA & NỔI BẬT */
        header {
            background: white;
            padding: 30px 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 20px;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
        }

            nav a {
                text-decoration: none;
                color: var(--dark);
                font-weight: 600;
                font-size: 20px;
                transition: 0.3s;
            }

                nav a:hover {
                    color: var(--primary);
                    transform: scale(1.1);
                }

        .auth-box {
            margin-left: 10px;
            padding-left: 20px;
            border-left: 2px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

            .hero h1 {
                font-size: 42px;
                text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            }

        .search-container {
            background: white;
            padding: 15px;
            border-radius: 50px;
            display: flex;
            width: 90%;
            max-width: 700px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-top: 20px;
        }

            .search-container input {
                flex: 1;
                border: none;
                padding: 10px 20px;
                outline: none;
                font-size: 16px;
            }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        /* DANH SÁCH BĐS */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.4s;
            cursor: pointer;
            position: relative;
        }

            .card:hover {
                transform: translateY(-10px);
                box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            }

        .card-img-wrapper {
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .price-tag {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: var(--accent);
            color: white;
            padding: 7px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        /* NÚT YÊU THÍCH */
        .wishlist-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gray);
            transition: 0.3s;
            z-index: 10;
        }

            .wishlist-btn:hover {
                transform: scale(1.2);
                color: var(--accent);
            }

            .wishlist-btn.active {
                color: var(--accent);
            }

        .card-content {
            padding: 25px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 0.9em;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
        }

        footer {
            background: var(--dark);
            color: white;
            padding: 50px 5%;
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><i class="fas fa-home"></i> BĐS NGHĨA</a>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="#">Nhà đất bán</a>
            <a href="#">Cho thuê</a>
            <div class="auth-box" id="auth-section">
                <a href="login.html" style="color: var(--primary);"><i class="fas fa-user-circle"></i> Đăng nhập</a>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>Khám phá ngôi nhà mơ ước</h1>
        <div class="search-container">
            <input type="text" placeholder="Nhập địa điểm, dự án...">
            <button class="search-btn">Tìm kiếm</button>
        </div>
    </section>

    <div id="list-bds" class="container">
        <p style="text-align: center; grid-column: 1/-1;">Đang tải dữ liệu từ MongoDB...</p>
    </div>

    <footer>
        <p>© 2026 Nguyễn Hữu Nghĩa - Hệ thống quản lý BĐS chuyên nghiệp</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const fullName = localStorage.getItem("username");
            const role = localStorage.getItem("role");
            const authSection = document.getElementById("auth-section");

            if (fullName) {
                // 1. Hiển thị tên người dùng đã đăng nhập
                let menuHTML = `<span style="font-size: 18px; font-weight:600;"><i class="fas fa-user"></i> ${fullName}</span>`;

                // 2. PHÂN QUYỀN ĐIỀU HƯỚNG
                if (role === "Admin") {
                    menuHTML += `
                <a href="admin-dashboard.html" style="margin-left:15px; font-size:18px; color: #e91e63;"><i class="fas fa-cogs"></i> Quản trị</a>
                <a href="add-property.html" style="margin-left:15px; font-size:18px; color: #28a745;"><i class="fas fa-plus-circle"></i> Đăng tin</a>
            `;
                }
                else if (role === "Sales") {
                    menuHTML += `
                <a href="add-property.html" style="margin-left:15px; font-size:18px; color: #28a745;"><i class="fas fa-plus-circle"></i> Đăng tin</a>
                <a href="manage-clients.html" style="margin-left:15px; font-size:18px; color: #1a73e8;"><i class="fas fa-users"></i> Khách hàng</a>
            `;
                }

                // 3. Nút đăng xuất dùng chung cho tất cả
                menuHTML += `<a href="#" class="logout-btn" onclick="logout()" style="font-size:18px; margin-left:15px; border-left: 1px solid #ccc; padding-left: 15px;">Thoát</a>`;

                authSection.innerHTML = menuHTML;
            }
            loadData();
        });

        function logout() {
            // XÓA SẠCH DỮ LIỆU KHI ĐĂNG XUẤT
            localStorage.removeItem("username");
            localStorage.removeItem("role");
            window.location.reload();
        }

        // Xử lý yêu thích
        function toggleFavorite(event, btn) {
            event.stopPropagation();
            btn.classList.toggle('active');
            const icon = btn.querySelector('i');
            icon.style.color = btn.classList.contains('active') ? '#e91e63' : '#5f6368';
        }

        // Xem chi tiết
        function viewDetail(id) {
            window.location.href = `detail.html?id=${id}`;
        }

        function loadData() {
            fetch('/api/BatDongSan')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    if (data.length === 0) {
                        html = '<p style="grid-column: 1/-1; text-align:center;">Chưa có dữ liệu nhà đất nào.</p>';
                    } else {
                        data.forEach(item => {
                            const realImg = item.hinhAnhUrl ? item.hinhAnhUrl : `https://loremflickr.com/400/300/house?lock=${item.id}`;
                            html += `
                                        <div class="card" onclick="viewDetail('${item.id}')">
                                            <div class="card-img-wrapper">
                                                <img src="${realImg}" class="card-img" alt="House">
                                                <span class="price-tag">${item.gia.toLocaleString('vi-VN')} đ</span>
                                                <button class="wishlist-btn" onclick="toggleFavorite(event, this)">
                                                    <i class="fas fa-heart"></i>
                                                </button>
                                            </div>
                                            <div class="card-content">
                                                <small style="color:var(--primary); font-weight:bold; text-transform:uppercase;">${item.loaiHinh}</small>
                                                <h3 style="margin: 10px 0; font-size:22px;">${item.tieuDe}</h3>
                                                <p style="color: #666; font-size: 14px;"><i class="fas fa-map-marker-alt"></i> ${item.diaChi}</p>
                                                <div class="info-row">
                                                    <span><i class="fas fa-bed"></i> 2 PN</span>
                                                    <span><i class="fas fa-bath"></i> 2 WC</span>
                                                    <span><i class="fas fa-expand"></i> 80m²</span>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                        });
                    }
                    document.getElementById('list-bds').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('list-bds').innerHTML = `<p style="color:red; text-align:center; grid-column:1/-1;">Lỗi: ${err.message}</p>`;
                });
        }
    </script>
</body>
</html>
