<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Hệ thống BĐS</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 100px;
            background: #202124;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

            input:focus {
                border-color: #1a73e8;
            }

        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            transition: 0.3s;
        }

            button:hover {
                background: #1557b0;
            }

        #message {
            color: red;
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="text-align:center; color: #1a73e8; margin-top: 0;">ĐĂNG NHẬP</h2>
        <input type="text" id="username" placeholder="Tên đăng nhập">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button id="btnLogin" onclick="handleLogin()">Đăng nhập</button>
        <p id="message"></p>
        <p style="text-align:center; font-size:13px; margin-top: 20px;">Chưa có tài khoản? <a href="register.html" style="color: #1a73e8;">Đăng ký ngay</a></p>
        <div style="text-align:center; margin-top: 10px;"><a href="index.html" style="font-size:12px; color:#666; text-decoration:none;">< Về trang chủ</a></div>
    </div>

    <script>
        async function handleLogin() {
            const messageBox = document.getElementById('message');
            const btn = document.getElementById('btnLogin');

            const userRequest = {
                Username: document.getElementById('username').value.trim(),
                Password: document.getElementById('password').value.trim()
            };

            if (!userRequest.Username || !userRequest.Password) {
                messageBox.innerText = "Vui lòng nhập đầy đủ thông tin!";
                return;
            }

            messageBox.style.color = "blue";
            messageBox.innerText = "Đang kiểm tra...";
            btn.disabled = true;
            btn.innerText = "Đang xử lý...";

            try {
                const response = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userRequest)
                });

                const contentType = response.headers.get("content-type");
                if (!response.ok && contentType && contentType.indexOf("application/json") === -1) {
                    throw new Error(`Lỗi hệ thống: Mã ${response.status}`);
                }

                const result = await response.json();

                if (response.ok) {
                    messageBox.style.color = "green";
                    messageBox.innerText = "Đăng nhập thành công! Đang chuyển hướng...";

                    localStorage.setItem("username", result.username);
                    localStorage.setItem("fullName", result.fullName);
                    localStorage.setItem("role", result.role);

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                } else {
                    messageBox.style.color = "red";
                    messageBox.innerText = result.message || "Sai tài khoản hoặc mật khẩu!";
                    btn.disabled = false;
                    btn.innerText = "Đăng nhập";
                }
            } catch (error) {
                console.error("Chi tiết lỗi:", error);
                messageBox.style.color = "red";
                messageBox.innerText = "Lỗi kết nối máy chủ!";
                btn.disabled = false;
                btn.innerText = "Đăng nhập";
            }
        }
    </script>
</body>
</html>
