<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --info: #36b9cc;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR ĐỒNG BỘ DASHBOARD --- */
        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

            .sidebar-brand i {
                transform: rotate(-15deg);
                margin-right: 10px;
                font-size: 24px;
            }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-heading {
            padding: 15px 20px 5px 20px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item i {
                width: 20px;
                text-align: center;
                font-size: 16px;
            }

            .nav-item:hover, .nav-item.active {
                color: white;
                background: rgba(255,255,255,0.1);
            }

        .divider {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 10px 20px;
        }

        /* --- CONTENT WRAPPER --- */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            z-index: 10;
        }

        .topbar-left a {
            color: var(--dark);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            background: var(--bg-light);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }

        /* --- NỘI DUNG QUẢN LÝ --- */
        .container-fluid {
            padding: 25px;
        }

        .page-title {
            margin-top: 0;
            color: var(--dark);
            margin-bottom: 25px;
            font-weight: 400;
            font-size: 28px;
        }

        .card-custom {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            border-top: 4px solid var(--info);
        }

        .form-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

            .form-box input {
                flex: 1;
                padding: 12px;
                border: 1px solid #d1d3e2;
                border-radius: 5px;
                outline: none;
                transition: 0.3s;
            }

                .form-box input:focus {
                    border-color: var(--primary);
                    box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
                }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add {
            background: var(--primary);
        }

        .btn-update {
            background: var(--success);
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #f8f9fc;
            color: var(--dark);
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 800;
            padding: 15px;
            border-bottom: 2px solid #e3e6f0;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e3e6f0;
            color: var(--dark);
            font-size: 15px;
        }

        tr:hover {
            background-color: #f8f9fc;
        }

        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: white;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand"><i class="fas fa-laugh-wink"></i> BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-fw fa-tachometer-alt"></i> Dashboard</a>
            <div class="divider"></div>
            <a href="add-property.html" class="nav-item"><i class="fas fa-fw fa-plus-square"></i> Đăng tin mới</a>
            <a href="manage-properties.html" class="nav-item"><i class="fas fa-fw fa-building"></i> DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item"><i class="fas fa-fw fa-tags"></i> Dự án & Chủ nhà</a>
            <a href="manage-category.html" class="nav-item active"><i class="fas fa-fw fa-list"></i> Quản lý danh mục</a>
            <a href="manage-contracts.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý hợp đồng</a>

            <div class="divider"></div>
            <a href="manage-transactions.html" class="nav-item"><i class="fas fa-fw fa-handshake"></i> Quản lý Giao dịch</a>
            <a href="manage-clients.html" class="nav-item"><i class="fas fa-fw fa-calendar-alt"></i> Lịch hẹn xem nhà</a>
            <a href="manage-customers.html" class="nav-item"><i class="fas fa-fw fa-users"></i> Hồ sơ Khách hàng</a>
            <a href="manage-employees.html" id="menu-employees" class="nav-item"><i class="fas fa-fw fa-user-tie"></i> Nhân viên sales</a>
            <a href="manage-news.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý Tin tức</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-left"><a href="index.html"><i class="fas fa-globe"></i> Xem trang chủ Website</a></div>
            <div class="user-profile">
                <span id="adminName">Đang tải...</span>
                <img src="https://source.unsplash.com/QAB-WJcbgJk/60x60" style="width: 32px; height: 32px; border-radius: 50%;">
                <button onclick="logout()" class="btn-logout" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="container-fluid">
            <h1 class="page-title">Quản lý loại hình BĐS</h1>

            <div class="card-custom">
                <div class="form-box">
                    <input type="hidden" id="catId">
                    <input type="text" id="catName" placeholder="Tên loại hình (Ví dụ: Căn hộ cao cấp, Đất nền...)">
                    <button class="btn btn-add" id="btnAdd" onclick="addCategory()"><i class="fas fa-plus"></i> Thêm mới</button>
                    <button class="btn btn-update" id="btnUpdate" onclick="saveEdit()"><i class="fas fa-save"></i> Lưu thay đổi</button>
                    <button class="btn" id="btnCancel" style="background:#858796; display:none;" onclick="cancelEdit()">Hủy</button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Tên loại hình</th>
                            <th style="width: 120px; text-align: center;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="catTableBody">
                        <tr><td colspan="2" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/Category';

        document.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("role");
            const username = localStorage.getItem("username");
            if (role !== "Admin") {
                alert("Bạn không có quyền truy cập khu vực này!");
                window.location.href = "index.html";
                return;
            }

            document.getElementById("adminName").innerText = username || "Admin";
            loadCategories();
        });

        function logout() { localStorage.clear(); window.location.href = "login.html"; }

        // 1. Tải danh sách
        async function loadCategories() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                let html = '';
                if (data.length === 0) html = '<tr><td colspan="2" style="text-align:center;">Chưa có dữ liệu.</td></tr>';
                data.forEach(c => {
                    html += `<tr>
                            <td><strong>${c.name}</strong></td>
                            <td style="text-align: center;">
                                <button class="btn-action" style="background:#f6c23e;" onclick="editCategory('${c.id}', '${c.name}')" title="Sửa"><i class="fas fa-edit"></i></button>
                                <button class="btn-action" style="background:var(--danger);" onclick="deleteCategory('${c.id}')" title="Xóa"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
                document.getElementById('catTableBody').innerHTML = html;
            } catch (e) { document.getElementById('catTableBody').innerHTML = '<tr><td colspan="2" style="color:red; text-align:center;">Lỗi tải dữ liệu!</td></tr>'; }
        }

        // 2. Thêm mới
        async function addCategory() {
            const name = document.getElementById('catName').value.trim();
            if (!name) return alert("Vui lòng nhập tên loại hình!");

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });

            if (res.ok) {
                document.getElementById('catName').value = '';
                loadCategories();
            }
        }

        // 3. Xóa
        async function deleteCategory(id) {
            if (confirm("Xóa loại hình này có thể làm ảnh hưởng đến các bài đăng đang thuộc loại này. Bạn chắc chắn chứ?")) {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (res.ok) loadCategories();
            }
        }

        // 4. Chuẩn bị Sửa
        function editCategory(id, name) {
            document.getElementById('catId').value = id;
            document.getElementById('catName').value = name;
            document.getElementById('btnAdd').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'inline-block';
            document.getElementById('btnCancel').style.display = 'inline-block';
            document.getElementById('catName').focus();
        }

        function cancelEdit() {
            document.getElementById('catId').value = '';
            document.getElementById('catName').value = '';
            document.getElementById('btnAdd').style.display = 'inline-block';
            document.getElementById('btnUpdate').style.display = 'none';
            document.getElementById('btnCancel').style.display = 'none';
        }

        // 5. Lưu Sửa
        async function saveEdit() {
            const id = document.getElementById('catId').value;
            const name = document.getElementById('catName').value.trim();

            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name })
            });

            if (res.ok) {
                cancelEdit();
                loadCategories();
            }
        }
    </script>
</body>
</html>
