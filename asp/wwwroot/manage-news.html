<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Tin tức - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

            .sidebar-brand i {
                transform: rotate(-15deg);
                margin-right: 10px;
                font-size: 24px;
            }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item:hover, .nav-item.active {
                color: white;
            }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            z-index: 10;
        }

        .container-fluid {
            padding: 25px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            border-top: 4px solid var(--info);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

            .form-group input, .form-group textarea {
                width: 100%;
                padding: 10px;
                border: 1px solid #d1d3e2;
                border-radius: 5px;
                outline: none;
                box-sizing: border-box;
            }

        .btn-add {
            background: #36b9cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

            .btn-add:hover {
                background: #2a96a5;
            }

        .news-list {
            display: grid;
            gap: 15px;
        }

        .news-item {
            display: flex;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            align-items: center;
        }

        .news-img {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
        }

        .btn-del {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand"><i class="fas fa-laugh-wink"></i> BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-fw fa-tachometer-alt"></i> Dashboard</a>
            <div class="divider"></div>
            <div class="nav-heading">Quản trị Nguồn hàng</div>
            <a href="add-property.html" class="nav-item"><i class="fas fa-fw fa-plus-square"></i> Đăng tin mới</a>
            <a href="manage-properties.html" class="nav-item"><i class="fas fa-fw fa-building"></i> DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item"><i class="fas fa-fw fa-tags"></i> Dự án & Chủ nhà</a>
            <div class="divider"></div>
            <div class="nav-heading">Nghiệp vụ Sales</div>
            <a href="manage-transactions.html" class="nav-item"><i class="fas fa-fw fa-handshake"></i> Quản lý Giao dịch</a>
            <a href="manage-clients.html" class="nav-item active"><i class="fas fa-fw fa-calendar-alt"></i> Lịch hẹn xem nhà</a>
            <a href="manage-customers.html" class="nav-item"><i class="fas fa-fw fa-users"></i> Hồ sơ Khách hàng</a>
            <a href="manage-news.html" class="nav-item active"><i class="fas fa-fw fa-newspaper"></i> Quản lý Tin tức</a>
        </div>
    </nav>
    <div class="content-wrapper">
        <header class="topbar">
            <div><a href="index.html" style="text-decoration:none; color:var(--dark); font-weight:bold;">Về trang chủ</a></div>
        </header>
        <div class="container-fluid">
            <h1 style="color:var(--dark); margin-top:0;">Viết bài Tin tức mới</h1>
            <div class="box">
                <div class="form-group"><input type="text" id="newsTitle" placeholder="Tiêu đề bài viết (*)"></div>
                <div class="form-group"><textarea id="newsDesc" rows="3" placeholder="Nội dung tóm tắt (*)"></textarea></div>
                <div class="form-group">
                    <label style="font-weight:bold; font-size:14px; color:var(--dark);">Tải ảnh đại diện bài viết</label><br>
                    <input type="file" id="newsImgFile" accept="image/*" style="margin-top:5px;">
                </div>
                <button class="btn-add" onclick="postNews()"><i class="fas fa-paper-plane"></i> XUẤT BẢN TIN TỨC</button>
                <p id="msgNews" style="text-align:center; font-weight:bold; margin-top:10px;"></p>
            </div>

            <h3 style="color:var(--dark);">Danh sách bài viết đã đăng</h3>
            <div class="news-list" id="news-container">Đang tải...</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", loadNews);

        function loadNews() {
            fetch('/api/News').then(res => res.json()).then(data => {
                let html = '';
                if(data.length === 0) html = '<p>Chưa có bài viết nào.</p>';
                data.forEach(n => {
                    const d = new Date(n.createdAt).toLocaleDateString('vi-VN');
                    html += `<div class="news-item">
                        <img src="${n.imageUrl}" class="news-img">
                        <div style="flex:1;">
                            <strong style="color:var(--primary); font-size:16px;">${n.title}</strong>
                            <div style="font-size:12px; color:#888;">Đăng bởi: ${n.author} - Ngày: ${d}</div>
                        </div>
                        <button class="btn-del" onclick="deleteNews('${n.id}')"><i class="fas fa-trash"></i></button>
                    </div>`;
                });
                document.getElementById('news-container').innerHTML = html;
            });
        }

        async function postNews() {
            const fileInput = document.getElementById('newsImgFile').files[0];
            const title = document.getElementById('newsTitle').value.trim();
            const desc = document.getElementById('newsDesc').value.trim();
            const msg = document.getElementById('msgNews');

            if(!title || !desc || !fileInput) { msg.style.color="red"; msg.innerText="Vui lòng nhập đủ thông tin và chọn ảnh!"; return; }

            msg.style.color="blue"; msg.innerText="Đang tải ảnh lên và lưu...";

            // Chuyển ảnh sang Base64
            const reader = new FileReader();
            reader.readAsDataURL(fileInput);
            reader.onload = async () => {
                const data = {
                    title: title, description: desc,
                    imageUrl: reader.result, author: localStorage.getItem('username') || 'Admin'
                };

                try {
                    const res = await fetch('/api/News', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
                    if(res.ok) {
                        msg.style.color="green"; msg.innerText="Đăng bài thành công!";
                        document.getElementById('newsTitle').value=''; document.getElementById('newsDesc').value='';
                        loadNews(); setTimeout(()=>msg.innerText="", 3000);
                    }
                } catch(e) { msg.style.color="red"; msg.innerText="Lỗi kết nối!"; }
            };
        }

        async function deleteNews(id) {
            if(confirm("Xác nhận xóa bài viết này?")) {
                await fetch(`/api/News/${id}`, { method:'DELETE' }); loadNews();
            }
        }
    </script>
</body>
</html>
