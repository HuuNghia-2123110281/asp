<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Dự án - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-heading {
            padding: 15px 20px 5px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item:hover, .nav-item.active {
                color: white;
            }

        .divider {
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 10px 20px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            z-index: 10;
        }

        .topbar-left a {
            color: var(--dark);
            text-decoration: none;
            font-weight: bold;
            background: var(--bg-light);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        .container-fluid {
            padding: 25px;
        }

        .page-title {
            margin-top: 0;
            color: var(--dark);
            font-size: 28px;
            margin-bottom: 20px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            border-top: 4px solid var(--success);
        }

        .form-box {
            display: none;
            background: #f8f9fc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e3e6f0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

            .form-group label {
                display: block;
                font-weight: bold;
                margin-bottom: 5px;
                color: var(--dark);
            }

            .form-group input {
                width: 100%;
                padding: 10px;
                border: 1px solid #d1d3e2;
                border-radius: 5px;
                box-sizing: border-box;
                outline: none;
            }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add {
            background: var(--success);
        }

        .btn-cancel {
            background: #858796;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #f8f9fc;
            color: var(--dark);
            font-size: 14px;
            padding: 15px;
            border-bottom: 2px solid #e3e6f0;
            text-align: left;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e3e6f0;
            color: var(--dark);
            font-size: 14px;
        }

        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            color: white;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand"><i class="fas fa-laugh-wink"></i> BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-fw fa-tachometer-alt"></i> Dashboard</a>
            <div class="divider"></div>
            <a href="add-property.html" class="nav-item"><i class="fas fa-fw fa-plus-square"></i> Đăng tin mới</a>
            <a href="manage-properties.html" class="nav-item"><i class="fas fa-fw fa-building"></i> DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item active"><i class="fas fa-fw fa-city"></i> Quản lý Dự án </a>
            <a href="manage-category.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý danh mục</a>
            <a href="manage-contracts.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý hợp đồng</a>

            <div class="divider"></div>

            <a href="manage-transactions.html" class="nav-item"><i class="fas fa-fw fa-handshake"></i> Quản lý Giao dịch</a>
            <a href="manage-clients.html" class="nav-item"><i class="fas fa-fw fa-calendar-alt"></i> Lịch hẹn xem nhà</a>
            <a href="manage-customers.html" class="nav-item"><i class="fas fa-fw fa-users"></i> Hồ sơ Khách hàng</a>
            <a href="manage-employees.html" id="menu-employees" class="nav-item"><i class="fas fa-fw fa-user-tie"></i> Nhân viên sales</a>
            <a href="manage-news.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý Tin tức</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-left"><a href="index.html"><i class="fas fa-globe"></i> Xem trang chủ Website</a></div>
            <div class="user-profile">
                <span id="adminName">Đang tải...</span>
                <button onclick="localStorage.clear(); window.location.href='login.html'" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="container-fluid">
            <h1 class="page-title">Quản lý Danh sách Dự án</h1>

            <div class="box">
                <button class="btn btn-add" onclick="showForm('add')"><i class="fas fa-plus"></i> THÊM DỰ ÁN MỚI</button>

                <div id="projectForm" class="form-box" style="margin-top: 20px;">
                    <h3 id="formTitle" style="margin-top:0; color:var(--success);">Thêm Dự Án Mới</h3>
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label>Tên dự án</label>
                        <input type="text" id="projName" placeholder="VD: Vinhomes Grand Park...">
                    </div>
                    <div class="form-group">
                        <label>Chủ đầu tư</label>
                        <input type="text" id="projInvestor" placeholder="Tên công ty/Tập đoàn...">
                    </div>
                    <button class="btn btn-add" id="btnSave" onclick="saveProject()">Lưu Dự Án</button>
                    <button class="btn btn-cancel" onclick="hideForm()">Hủy Bỏ</button>
                </div>

                <table style="margin-top: 20px;">
                    <thead>
                        <tr>
                            <th>Tên Dự Án</th>
                            <th>Chủ đầu tư</th>
                            <th style="width: 120px; text-align: center;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="list-projects">
                        <tr><td colspan="3" style="text-align:center;">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("role");
            const username = localStorage.getItem("username");

            if (role !== "Admin" && role !== "Sales") {
                window.location.href = "index.html";
                return;
            }

            if (role === "Sales") {
                const empMenu = document.getElementById("menu-employees");
                if (empMenu) empMenu.style.display = "none";
            }

            document.getElementById("adminName").innerText = username || "Admin";
            loadProjects();
        });

        // TẢI DANH SÁCH
        async function loadProjects() {
            try {
                const resProj = await fetch('/api/Project');
                const projects = await resProj.json();

                let projHtml = '';
                if (projects.length === 0) projHtml = '<tr><td colspan="3" style="text-align:center;">Chưa có dự án nào.</td></tr>';

                projects.forEach(d => {
                    const name = d.name ? d.name.replace(/'/g, "\\'") : '';
                    const inv = d.investor ? d.investor.replace(/'/g, "\\'") : '';

                    projHtml += `<tr>
                            <td><strong style="color:var(--primary); font-size:16px;">${name}</strong></td>
                            <td>${inv || 'Đang cập nhật'}</td>
                            <td style="text-align: center;">
                                <button class="btn-action" style="background:var(--warning);"
                                    onclick="showForm('edit', '${d.id}', '${name}', '${inv}')" title="Sửa">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-action" style="background:var(--danger);"
                                    onclick="deleteProject('${d.id}')" title="Xóa">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>`;
                });
                document.getElementById('list-projects').innerHTML = projHtml;
            } catch (e) {
                document.getElementById('list-projects').innerHTML = '<tr><td colspan="3" style="color:red; text-align:center;">Lỗi kết nối máy chủ!</td></tr>';
            }
        }

        // BẬT / TẮT FORM
        function showForm(mode, id = '', name = '', inv = '') {
            document.getElementById('projectForm').style.display = 'block';
            if (mode === 'add') {
                document.getElementById('formTitle').innerText = 'Thêm Dự Án Mới';
                document.getElementById('editId').value = '';
                document.getElementById('projName').value = '';
                document.getElementById('projInvestor').value = '';
            } else {
                document.getElementById('formTitle').innerText = 'Cập Nhật Dự Án';
                document.getElementById('editId').value = id;
                document.getElementById('projName').value = name;
                document.getElementById('projInvestor').value = inv;
            }
        }

        function hideForm() {
            document.getElementById('projectForm').style.display = 'none';
        }

        // LƯU (THÊM / SỬA)
        async function saveProject() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('projName').value.trim(),
                investor: document.getElementById('projInvestor').value.trim()
            };

            if (!data.name) return alert("Vui lòng nhập Tên Dự Án!");

            const url = id ? `/api/Project/${id}` : `/api/Project`;
            const method = id ? 'PUT' : 'POST';

            document.getElementById('btnSave').innerText = "Đang xử lý...";

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert(id ? "Cập nhật thành công!" : "Thêm mới thành công!");
                    hideForm();
                    loadProjects();
                } else {
                    alert("Lỗi lưu dữ liệu!");
                }
            } catch (e) { alert("Lỗi kết nối máy chủ!"); }

            document.getElementById('btnSave').innerText = "Lưu Dự Án";
        }

        // XÓA
        async function deleteProject(id) {
            if (confirm("Bạn có chắc chắn muốn xóa dự án này không?")) {
                const res = await fetch(`/api/Project/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadProjects();
                } else {
                    alert("Lỗi khi xóa dự án!");
                }
            }
        }
    </script>
</body>
</html>
