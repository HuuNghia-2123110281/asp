<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự án & Chủ nhà - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-heading {
            padding: 15px 20px 5px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item:hover, .nav-item.active {
                color: white;
            }

        .divider {
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 10px 20px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            z-index: 10;
        }

        .topbar-left a {
            color: var(--dark);
            text-decoration: none;
            font-weight: bold;
            background: var(--bg-light);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }

        .container-fluid {
            padding: 25px;
        }

        .page-title {
            margin-top: 0;
            color: var(--dark);
            font-size: 28px;
            margin-bottom: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
        }

        .form-group {
            margin-bottom: 15px;
        }

            .form-group input {
                width: 100%;
                padding: 10px;
                border: 1px solid #d1d3e2;
                border-radius: 5px;
                box-sizing: border-box;
                outline: none;
            }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .data-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e3e6f0;
            border-radius: 5px;
            background: #f8f9fc;
        }

        .data-item {
            padding: 15px;
            border-bottom: 1px solid #e3e6f0;
        }

            .data-item:last-child {
                border-bottom: none;
            }
    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand"><i class="fas fa-laugh-wink"></i> BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-fw fa-tachometer-alt"></i> Dashboard</a>
            <div class="divider"></div>
            <div class="nav-heading">Quản trị Nguồn hàng</div>
            <a href="add-property.html" class="nav-item"><i class="fas fa-fw fa-plus-square"></i> Đăng tin mới</a>
            <a href="manage-properties.html" class="nav-item"><i class="fas fa-fw fa-building"></i> DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item active"><i class="fas fa-fw fa-tags"></i> Dự án & Chủ nhà</a>
            <div class="divider"></div>
            <div class="nav-heading">Nghiệp vụ Sales</div>
            <a href="manage-transactions.html" class="nav-item"><i class="fas fa-fw fa-handshake"></i> Quản lý Giao dịch</a>
            <a href="manage-clients.html" class="nav-item"><i class="fas fa-fw fa-calendar-alt"></i> Lịch hẹn xem nhà</a>
            <a href="manage-customers.html" class="nav-item"><i class="fas fa-fw fa-users"></i> Hồ sơ Khách hàng</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-left"><a href="index.html"><i class="fas fa-globe"></i> Xem trang chủ Website</a></div>
            <div class="user-profile">
                <span id="adminName">Đang tải...</span>
                <button onclick="localStorage.clear(); window.location.href='login.html'" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="container-fluid">
            <h1 class="page-title">Quản lý Dự án & Chủ nhà</h1>
            <div class="grid-2">
                <div class="box" style="border-top: 4px solid var(--success);">
                    <h3 style="margin-top:0; color: var(--success);"><i class="fas fa-building"></i> Danh sách Dự Án</h3>
                    <div class="form-group"><input type="text" id="projName" placeholder="Tên dự án (VD: Vinhomes)..."></div>
                    <div class="form-group"><input type="text" id="projInvestor" placeholder="Chủ đầu tư..."></div>
                    <button class="btn-add" style="background: var(--success);" onclick="addProject()"><i class="fas fa-plus"></i> THÊM DỰ ÁN</button>
                    <div class="data-list" id="list-projects">Đang tải...</div>
                </div>

                <div class="box" style="border-top: 4px solid var(--warning);">
                    <h3 style="margin-top:0; color: #d39e00;"><i class="fas fa-user-tie"></i> Hồ sơ Chủ Nhà Ký Gửi</h3>
                    <div class="form-group"><input type="text" id="ownName" placeholder="Họ tên Chủ nhà..."></div>
                    <div class="form-group"><input type="text" id="ownPhone" placeholder="Số điện thoại..."></div>
                    <button class="btn-add" style="background: var(--warning); color: #333;" onclick="addOwner()"><i class="fas fa-plus"></i> THÊM CHỦ NHÀ</button>
                    <div class="data-list" id="list-owners">Đang tải...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("adminName").innerText = localStorage.getItem("username") || "Admin";
            loadAllData();
        });

        async function loadAllData() {
            const [resProj, resOwn, resBds] = await Promise.all([fetch('/api/Project'), fetch('/api/Owner'), fetch('/api/BatDongSan')]);
            const projects = await resProj.json();
            const owners = await resOwn.json();
            const bdsList = await resBds.json();

            // Render Dự án
            let projHtml = '';
            projects.forEach(d => projHtml += `<div class="data-item"><strong style="font-size:16px;">${d.name}</strong><br><small style="color:#858796;">CĐT: ${d.investor || 'Đang cập nhật'}</small></div>`);
            document.getElementById('list-projects').innerHTML = projHtml || '<div class="data-item">Chưa có dữ liệu</div>';

            // Render Chủ nhà & BĐS đã ký gửi (Truy vấn thật từ DB)
            let ownHtml = '';
            owners.forEach(o => {
                // Lọc ra các BĐS thuộc sở hữu của ông này
                const ownerProps = bdsList.filter(b => b.ownerId === o.id);
                let propDetails = ownerProps.length > 0
                    ? ownerProps.map(b => `<div style="background:white; border:1px solid #ddd; padding:4px 8px; border-radius:4px; margin-top:5px; font-size:12px;"><b>[${b.loaiHinh}]</b> ${b.tieuDe}</div>`).join('')
                    : '<small style="color:#e74a3b;">Chưa ký gửi BĐS nào</small>';

                ownHtml += `<div class="data-item">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <strong style="color:var(--dark); font-size:15px;">${o.fullName}</strong>
                            <span style="color:var(--primary); font-weight:bold;"><i class="fas fa-phone"></i> ${o.phone}</span>
                        </div>
                        <div style="color:#858796; font-size:13px; font-weight:bold; margin-top:10px;">BĐS Đang ký gửi:</div>
                        ${propDetails}
                    </div>`;
            });
            document.getElementById('list-owners').innerHTML = ownHtml || '<div class="data-item">Chưa có dữ liệu</div>';
        }

        async function addProject() {
            const data = { name: document.getElementById('projName').value, investor: document.getElementById('projInvestor').value };
            await fetch('/api/Project', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            document.getElementById('projName').value = ''; loadAllData();
        }

        async function addOwner() {
            const data = { fullName: document.getElementById('ownName').value, phone: document.getElementById('ownPhone').value };
            await fetch('/api/Owner', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            document.getElementById('ownName').value = ''; document.getElementById('ownPhone').value = ''; loadAllData();
        }
    </script>
</body>
</html>
