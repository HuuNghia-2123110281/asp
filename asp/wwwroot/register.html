<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - BĐS Nghĩa</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f2f5;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; color: #28a745;">ĐĂNG KÝ</h2>
        <input type="text" id="reg-user" placeholder="Tên đăng nhập">
        <input type="password" id="reg-pass" placeholder="Mật khẩu">
        <input type="text" id="reg-name" placeholder="Họ và tên">
        <input type="email" id="reg-email" placeholder="Email">
        <button onclick="handleRegister()">Tạo tài khoản</button>
        <p style="text-align: center; font-size: 14px;">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
    </div>

    <script>
        async function handleRegister() {
            const data = {
                username: document.getElementById('reg-user').value,
                password: document.getElementById('reg-pass').value,
                fullName: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value
            };

            const response = await fetch('/api/Auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            alert(result.message);
            if (response.ok) window.location.href = 'login.html';
        }
    </script>
</body>
</html>
