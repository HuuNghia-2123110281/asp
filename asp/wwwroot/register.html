<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - BĐS Nghĩa</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 100px;
            background: #202124;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

            input:focus {
                border-color: #1a73e8;
            }

        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            margin-top: 10px;
            transition: 0.3s;
        }

            button:hover {
                background: #1557b0;
            }

        #message {
            color: red;
            text-align: center;
            font-size: 13px;
            margin-top: 15px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center; color: #1a73e8; margin-top: 0;">ĐĂNG KÝ</h2>

        <input type="text" id="reg-user" placeholder="Tên đăng nhập (*)">
        <input type="password" id="reg-pass" placeholder="Mật khẩu (*)">
        <input type="text" id="reg-name" placeholder="Họ và tên (*)">

        <input type="tel" id="reg-phone" placeholder="Số điện thoại  (*)">
        <input type="email" id="reg-email" placeholder="Email (*)">

        <button id="btnRegister" onclick="handleRegister()">Tạo tài khoản</button>
        <p id="message"></p>

        <p style="text-align: center; font-size: 14px; margin-top: 20px;">Đã có tài khoản? <a href="login.html" style="color: #1a73e8;">Đăng nhập</a></p>
        <div style="text-align:center; margin-top: 10px;"><a href="index.html" style="font-size:12px; color:#666; text-decoration:none;">< Về trang chủ</a></div>
    </div>

    <script>
        async function handleRegister() {
            const messageBox = document.getElementById('message');
            const btn = document.getElementById('btnRegister');

            const user = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const email = document.getElementById('reg-email').value.trim();


            if (!user || !pass || !name || !phone) {
                messageBox.style.color = "red";
                messageBox.innerText = "Vui lòng nhập đầy đủ các trường bắt buộc (*)!";
                return;
            }


            const phoneRegex = /^0\d{9}$/;
            if (!phoneRegex.test(phone)) {
                messageBox.style.color = "red";
                messageBox.innerText = "Số điện thoại không hợp lệ";
                return;
            }

            const data = {
                username: user,
                password: pass,
                fullName: name,
                phone: phone,
                email: email
            };


            messageBox.style.color = "blue";
            messageBox.innerText = "Đang tạo tài khoản...";
            btn.disabled = true;
            btn.innerText = "Đang xử lý...";

            try {
                const response = await fetch('/api/Auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const contentType = response.headers.get("content-type");
                if (!response.ok && contentType && contentType.indexOf("application/json") === -1) {
                    throw new Error(`Lỗi hệ thống: Mã ${response.status}`);
                }

                const result = await response.json();

                if (response.ok) {
                    messageBox.style.color = "green";
                    messageBox.innerText = "Đăng ký thành công! Đang chuyển hướng...";
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    messageBox.style.color = "red";
                    messageBox.innerText = result.message || "Đăng ký thất bại!";
                    btn.disabled = false;
                    btn.innerText = "Tạo tài khoản";
                }
            } catch (error) {
                console.error("Lỗi:", error);
                messageBox.style.color = "red";
                messageBox.innerText = "Lỗi kết nối máy chủ!";
                btn.disabled = false;
                btn.innerText = "Tạo tài khoản";
            }
        }
    </script>
</body>
</html>
