<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Giao dịch - BĐS Nghĩa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --success: #1cc88a;
            --info: #36b9cc;
            --warning: #f6c23e;
            --danger: #e74a3b;
            --dark: #5a5c69;
            --bg-light: #f8f9fc;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR & TOPBAR ĐỒNG BỘ */
        .sidebar {
            width: 250px;
            background-image: linear-gradient(180deg, var(--primary) 10%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

            .sidebar-brand i {
                transform: rotate(-15deg);
                margin-right: 10px;
                font-size: 24px;
            }

        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .nav-heading {
            padding: 15px 20px 5px 20px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.2s;
        }

            .nav-item i {
                width: 20px;
                text-align: center;
                font-size: 16px;
            }

            .nav-item:hover, .nav-item.active {
                color: white;
            }

        .divider {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 10px 20px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            background: white;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            z-index: 10;
        }

        .topbar-left a {
            color: var(--dark);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            background: var(--bg-light);
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

            .topbar-left a:hover {
                background: #eaecf4;
            }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

            .user-profile span {
                font-weight: 600;
                color: var(--dark);
                font-size: 14px;
            }

        .btn-logout {
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }

        /* CHI TIẾT GIAO DỊCH STYLES */
        .container-fluid {
            padding: 25px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .page-title {
            margin: 0;
            color: var(--dark);
            font-weight: 400;
            font-size: 28px;
        }

        .back-btn {
            background: white;
            color: var(--dark);
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

            .back-btn:hover {
                background: #eaecf4;
                color: var(--primary);
            }

        .detail-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
            overflow: hidden;
            border-top: 4px solid var(--primary);
        }

        .header-card {
            background: #f8f9fc;
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #e3e6f0;
        }

            .header-card h1 {
                margin: 0;
                font-size: 22px;
                color: var(--dark);
                font-weight: 800;
            }

            .header-card .price {
                font-size: 32px;
                font-weight: bold;
                margin-top: 10px;
                color: var(--primary);
            }

        .content {
            padding: 30px 40px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #eaecf4;
            font-size: 16px;
        }

        .info-label {
            color: #858796;
            font-weight: bold;
        }

        .info-value {
            color: var(--dark);
            font-weight: bold;
            text-align: right;
            max-width: 60%;
        }

        .status-badge {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            display: inline-block;
        }

        .status-completed {
            background: var(--success);
        }

        .status-pending {
            background: var(--warning);
            color: #333;
        }

        .status-cancelled {
            background: var(--danger);
        }

        .action-box {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fc;
            border-radius: 8px;
            text-align: center;
            border: 1px dashed #d1d3e2;
        }

        .action-btn {
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            margin: 0 5px;
            color: white;
            transition: 0.2s;
        }

        .btn-complete {
            background: var(--success);
        }

            .btn-complete:hover {
                background: #17a673;
            }

        .btn-cancel {
            background: var(--danger);
        }

            .btn-cancel:hover {
                background: #e74a3b;
            }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="admin-dashboard.html" class="sidebar-brand"><i class="fas fa-laugh-wink"></i> BĐS NGHĨA</a>
        <div class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item active"><i class="fas fa-fw fa-tachometer-alt"></i> Dashboard</a>

            <div class="divider"></div>

            <a href="add-property.html" class="nav-item"><i class="fas fa-fw fa-plus-square"></i> Đăng tin mới</a>
            <a href="manage-properties.html" class="nav-item"><i class="fas fa-fw fa-building"></i> DS Bất động sản</a>
            <a href="manage-system.html" class="nav-item"><i class="fas fa-fw fa-tags"></i> Dự án & Chủ nhà</a>
            <a href="manage-category.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý danh mục</a>
            <a href="manage-contracts.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý hợp đồng</a>

            <div class="divider"></div>

            <a href="manage-transactions.html" class="nav-item"><i class="fas fa-fw fa-handshake"></i> Quản lý Giao dịch</a>
            <a href="manage-clients.html" class="nav-item"><i class="fas fa-fw fa-calendar-alt"></i> Lịch hẹn xem nhà</a>
            <a href="manage-customers.html" class="nav-item"><i class="fas fa-fw fa-users"></i> Hồ sơ Khách hàng</a>
            <a href="manage-employees.html" id="menu-employees" class="nav-item"><i class="fas fa-fw fa-user-tie"></i> Nhân viên sales</a>
            <a href="manage-news.html" class="nav-item"><i class="fas fa-fw fa-newspaper"></i> Quản lý Tin tức</a>
        </div>
    </nav>

    <div class="content-wrapper">
        <header class="topbar">
            <div class="topbar-left"><a href="index.html"><i class="fas fa-globe"></i> Xem trang chủ Website</a></div>
            <div class="user-profile">
                <span id="adminName">Đang tải...</span>
                <img src="https://source.unsplash.com/QAB-WJcbgJk/60x60" style="width: 32px; height: 32px; border-radius: 50%;">
                <button onclick="logout()" class="btn-logout" title="Đăng xuất"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <div class="container-fluid">
            <div class="page-header">
                <h1 class="page-title">Hồ sơ Giao dịch</h1>
                <a href="manage-transactions.html" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại danh sách</a>
            </div>

            <div class="detail-card" id="transaction-content">
                <p style="padding: 50px; text-align: center; color: var(--primary); font-weight: bold;"><i class="fas fa-spinner fa-spin"></i> Đang tải thông tin chi tiết...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. KIỂM TRA PHÂN QUYỀN 
            const role = localStorage.getItem("role");
            const username = localStorage.getItem("username");

            if (role !== "Admin" && role !== "Sales") {
                window.location.href = "index.html";
                return;
            }

            // 2. TÀNG HÌNH MENU NHÂN VIÊN 
            if (role === "Sales") {
                const empMenu = document.getElementById("menu-employees");
                if (empMenu) {
                    empMenu.style.display = "none";
                }
            }

            // 3. HIỂN THỊ TÊN
            document.getElementById("adminName").innerText = username || "Sales";
            const urlParams = new URLSearchParams(window.location.search);
            const transactionId = urlParams.get('id');

            if (transactionId) {
                fetchTransactionDetail(transactionId);
            } else {
                document.getElementById('transaction-content').innerHTML = "<p style='text-align:center; padding: 50px; color: red; font-weight:bold;'>Không tìm thấy mã giao dịch!</p>";
            }
        });

        function logout() { localStorage.clear(); window.location.href = "login.html"; }

        async function fetchTransactionDetail(id) {
            try {
                const response = await fetch(`/api/Transaction/${id}`);
                if (!response.ok) throw new Error("Giao dịch không tồn tại");
                const trans = await response.json();

                let customerName = "Đang tải...";
                let propertyName = "Đang tải...";

                // Thử lấy tên thật của Khách hàng và BĐS
                try {
                    const cusRes = await fetch(`/api/Customer/${trans.customerId}`);
                    if (cusRes.ok) { const cus = await cusRes.json(); customerName = cus.name; }
                    else { customerName = "Thành viên Web: " + trans.customerId.substring(0, 8); }
                } catch (e) { }

                try {
                    const propRes = await fetch(`/api/BatDongSan/${trans.propertyId}`);
                    if (propRes.ok) { const prop = await propRes.json(); propertyName = prop.tieuDe; }
                } catch (e) { }

                // Xử lý màu trạng thái
                let statusClass = "status-pending";
                if (trans.status === "Hoàn tất" || trans.status === "Completed") statusClass = "status-completed";
                if (trans.status === "Đã hủy" || trans.status === "Cancelled") statusClass = "status-cancelled";

                const dateObj = new Date(trans.date);
                const formattedDate = `${dateObj.getDate()}/${dateObj.getMonth() + 1}/${dateObj.getFullYear()} ${dateObj.getHours()}:${dateObj.getMinutes()}`;

                document.getElementById('transaction-content').innerHTML = `
                        <div class="header-card">
                            <h1>MÃ GIAO DỊCH: #${trans.id.substring(0, 6).toUpperCase()}</h1>
                            <div class="price">${trans.price.toLocaleString('vi-VN')} VNĐ</div>
                            <div style="margin-top: 15px;">
                                <span class="status-badge ${statusClass}">${trans.status.toUpperCase()}</span>
                            </div>
                        </div>

                        <div class="content">
                            <div class="info-row">
                                <span class="info-label"><i class="fas fa-user"></i> Khách hàng:</span>
                                <span class="info-value" style="color: var(--primary);">${customerName}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label"><i class="fas fa-home"></i> Bất động sản:</span>
                                <span class="info-value">${propertyName}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label"><i class="fas fa-file-signature"></i> Loại hợp đồng:</span>
                                <span class="info-value">${trans.type || "Mua bán"}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label"><i class="fas fa-calendar-alt"></i> Ngày chốt:</span>
                                <span class="info-value">${formattedDate}</span>
                            </div>

                            ${(trans.status !== 'Hoàn tất' && trans.status !== 'Completed' && trans.status !== 'Đã hủy' && trans.status !== 'Cancelled') ? `
                                <div class="action-box">
                                    <p style="margin: 0 0 15px 0; color: var(--dark); font-weight:bold;">Cập nhật tiến độ hồ sơ</p>
                                    <button onclick="updateStatus('${trans.id}', 'Hoàn tất')" class="action-btn btn-complete"><i class="fas fa-check"></i> Đánh dấu Hoàn Tất</button>
                                    <button onclick="updateStatus('${trans.id}', 'Đã hủy')" class="action-btn btn-cancel"><i class="fas fa-times"></i> Hủy giao dịch</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
            } catch (err) {
                document.getElementById('transaction-content').innerHTML = `<p style="text-align:center; padding:50px; color:red; font-weight:bold;">Lỗi: ${err.message}</p>`;
            }
        }

        async function updateStatus(id, newStatus) {
            if (!confirm(`Xác nhận chuyển giao dịch này sang trạng thái: ${newStatus}?`)) return;
            try {
                const res = await fetch(`/api/Transaction/${id}/status`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newStatus)
                });
                if (res.ok) { alert("✅ Cập nhật thành công!"); location.reload(); }
                else { alert("❌ Lỗi khi cập nhật!"); }
            } catch (e) { alert("❌ Lỗi kết nối mạng!"); }
        }
    </script>
</body>
</html>
